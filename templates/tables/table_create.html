{% extends 'base.html' %}

{% block title %}Create Table - Flow-Force Workspace{% endblock %}

{% block content %}
<div class="container-fluid py-6 max-w-lg mx-auto">
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
        <h1 class="text-xl font-bold text-gray-900 mb-2">Create New Table</h1>
        <p class="text-xs text-gray-500 mb-6">Create a dynamic spreadsheet table workspace for tracking tasks.</p>
        
        <form method="POST" action="" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="name" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-2">Table Name</label>
                <input type="text" name="name" id="name" required placeholder="e.g. Q3 Sales Pipeline" class="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-lg p-2.5 text-sm focus:ring-primary focus:border-primary">
            </div>

            <div>
                <label for="description" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-2">Description</label>
                <textarea name="description" id="description" rows="3" placeholder="Optional description..." class="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-lg p-2.5 text-sm focus:ring-primary focus:border-primary"></textarea>
            </div>

            <div>
                <label for="job_type" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-2">Job / Dashboard Type</label>
                <select name="job_type" id="job_type" class="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-lg p-2.5 text-sm focus:ring-primary focus:border-primary">
                    <option value="GENERAL">General</option>
                    <option value="SALES">Sales</option>
                    <option value="ENGINEER">Engineer</option>
                </select>
            </div>



            <div class="flex justify-end gap-3 mt-6">
                <a href="/" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-lg text-sm px-4 py-2.5">Cancel</a>
                <button type="submit" class="bg-primary hover:bg-blue-700 text-white font-medium rounded-lg text-sm px-5 py-2.5 transition duration-150 ease-in-out">
                    Create Workspace
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
