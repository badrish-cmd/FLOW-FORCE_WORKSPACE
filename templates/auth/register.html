{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Register - Flow-Force Workspace</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{% static 'css/auth/register.css' %}"
    >

</head>

<body>

<div class="register-wrapper">

    <div class="register-left">

        <div class="register-left-content">

            <h1>Flow-Force Workspace</h1>

            <p>
                Create your employee account and
                start collaborating with your team.
            </p>

        </div>

    </div>

    <div class="register-right">

        <div class="register-card">

            <h2 class="register-title">
                Create Account
            </h2>

            <p class="register-subtitle">
                Registration requires administrator approval.
            </p>

            <form
                id="registerForm"
                method="POST"
                action="{% url 'register' %}"
            >

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Full Name
                    </label>

                    <input
                        type="text"
                        name="full_name"
                        class="form-control"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Company Email
                    </label>

                    <input
                        id="email"
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="name@flow-force.com"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        id="password"
                        type="password"
                        name="password"
                        class="form-control"
                        required
                    >

                    <div
                        id="passwordStrength"
                        class="password-strength"
                    ></div>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Confirm Password
                    </label>

                    <input
                        id="confirm_password"
                        type="password"
                        name="confirm_password"
                        class="form-control"
                        required
                    >

                </div>

                <button
                    type="submit"
                    class="btn btn-register w-100"
                >
                    Create Account
                </button>

            </form>

            <div class="text-center mt-4">

                <a href="{% url 'login' %}">
                    Back to Login
                </a>

            </div>

        </div>

    </div>

</div>

<script src="{% static 'js/auth/register.js' %}"></script>

</body>
</html>
