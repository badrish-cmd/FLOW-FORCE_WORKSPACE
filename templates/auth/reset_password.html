{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Flow-Force Workspace</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/auth/reset_password.css' %}">
</head>
<body>

<div class="login-wrapper">

    <!-- LEFT BRAND PANEL -->

    <div class="login-brand-section d-none d-lg-flex">

        <div class="brand-content">

            <div class="brand-logo mb-5">
                <i class="fas fa-lock"></i>
            </div>

            <h1 class="brand-title">
                Secure Password Reset
            </h1>

            <p class="brand-subtitle">
                Protect your workspace with a strong password.
            </p>

            <div class="brand-features mt-5">

                <div class="feature">
                    <i class="fas fa-check-circle"></i>
                    <span>Password Encryption</span>
                </div>

                <div class="feature">
                    <i class="fas fa-check-circle"></i>
                    <span>Secure Authentication</span>
                </div>

                <div class="feature">
                    <i class="fas fa-check-circle"></i>
                    <span>OTP Verification Completed</span>
                </div>

                <div class="feature">
                    <i class="fas fa-check-circle"></i>
                    <span>Enterprise Security</span>
                </div>

            </div>

        </div>

    </div>

    <!-- RIGHT FORM PANEL -->

    <div class="login-form-section">

        <div class="login-form-container">

            <div class="login-card">

                <div class="text-center mb-4">

                    <h2 class="login-title">
                        Reset Password
                    </h2>

                    <p class="login-subtitle">
                        Create a new secure password.
                    </p>

                </div>

                <form id="resetPasswordForm" method="POST" action="{% url 'reset_password' %}">

		{% csrf_token %}

                    <!-- NEW PASSWORD -->

                    <div class="mb-4">

                        <label class="form-label">
                            <i class="fas fa-lock"></i>
                            New Password
                        </label>

                        <div class="password-input-wrapper">

                            <input
                                type="password"
                                class="form-control form-control-lg"
                                id="newPassword"
				name="password"
                                placeholder="Enter new password"
                                required>

                            <button
                                type="button"
                                class="password-toggle"
                                id="toggleNewPassword">

                                <i class="fas fa-eye"></i>

                            </button>

                        </div>

                    </div>

                    <!-- STRENGTH -->

                    <div class="mb-4">

                        <div class="progress">

                            <div
                                class="progress-bar"
                                id="strengthBar"
                                role="progressbar">
                            </div>

                        </div>

                        <small id="strengthText">
                            Password Strength
                        </small>

                    </div>

                    <!-- CONFIRM -->

                    <div class="mb-4">

                        <label class="form-label">
                            <i class="fas fa-shield-alt"></i>
                            Confirm Password
                        </label>

                        <div class="password-input-wrapper">

                            <input
                                type="password"
                                class="form-control form-control-lg"
                                id="confirmPassword"
				name="confirm_password"
                                placeholder="Confirm password"
                                required>

                            <button
                                type="button"
                                class="password-toggle"
                                id="toggleConfirmPassword">

                                <i class="fas fa-eye"></i>

                            </button>

                        </div>

                    </div>

                    <div
                        class="alert alert-danger d-none"
                        id="errorAlert">
                    </div>

                    <div
                        class="alert alert-success d-none"
                        id="successAlert">
                    </div>

                    <button
                        type="submit"
                        class="btn btn-login btn-lg w-100">

                        Change Password

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<script src="{% static 'js/auth/reset_password.js' %}"></script>

</body>
</html>
